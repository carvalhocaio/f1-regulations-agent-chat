name: Deploy

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  RAG_REGION: ${{ secrets.GCP_RAG_REGION }}
  STAGING_BUCKET: ${{ secrets.GCP_STAGING_BUCKET }}
  SA_EMAIL: ${{ secrets.GCP_SA_EMAIL }}
  RAG_CORPUS: ${{ secrets.GCP_RAG_CORPUS }}
  MEMORY_BANK_ENABLED: ${{ secrets.GCP_MEMORY_BANK_ENABLED }}
  MEMORY_BANK_AGENT_ENGINE_NAME: ${{ secrets.GCP_MEMORY_BANK_AGENT_ENGINE_NAME }}
  CODE_EXECUTION_ENABLED: ${{ secrets.GCP_CODE_EXECUTION_ENABLED }}
  CODE_EXECUTION_AGENT_ENGINE_NAME: ${{ secrets.GCP_CODE_EXECUTION_AGENT_ENGINE_NAME }}
  AGENT_MIN_INSTANCES: ${{ secrets.GCP_AGENT_MIN_INSTANCES }}
  AGENT_MAX_INSTANCES: ${{ secrets.GCP_AGENT_MAX_INSTANCES }}
  AGENT_CONTAINER_CONCURRENCY: ${{ secrets.GCP_AGENT_CONTAINER_CONCURRENCY }}
  PREFLIGHT_TOKEN_CHECK_ENABLED: ${{ secrets.GCP_PREFLIGHT_TOKEN_CHECK_ENABLED }}
  PREFLIGHT_TOKEN_THRESHOLD: ${{ secrets.GCP_PREFLIGHT_TOKEN_THRESHOLD }}
  PREFLIGHT_TOKEN_HARD_LIMIT: ${{ secrets.GCP_PREFLIGHT_TOKEN_HARD_LIMIT }}
  ARTIFACTS_BUCKET: "${{ secrets.GCP_PROJECT_ID }}-artifacts"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      UV_PYTHON: "3.11"

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Or, with Workload Identity Federation:
          # workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          # service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download data artifacts
        run: |
          mkdir -p vector_store f1_data
          gcloud storage cp -r "gs://$ARTIFACTS_BUCKET/vector_store/*" ./vector_store/
          gcloud storage cp -r "gs://$ARTIFACTS_BUCKET/f1_data/*" ./f1_data/

          # Normalize nested layouts from historical uploads (e.g. vector_store/vector_store/*).
          if [ -d vector_store/vector_store ]; then
            cp -a vector_store/vector_store/. vector_store/
          fi
          if [ -d f1_data/f1_data ]; then
            cp -a f1_data/f1_data/. f1_data/
          fi

          test -f vector_store/index.faiss
          test -f vector_store/index.pkl
          test -f f1_data/f1_history.db

      - name: Generate requirements-deploy.txt
        run: uv export --frozen --no-hashes --no-dev --no-editable --no-annotate --no-header --no-emit-project -o requirements-deploy.txt

      - name: Deploy to Agent Engine
        run: |
          AGENT_MIN_INSTANCES="${AGENT_MIN_INSTANCES:-2}"
          AGENT_MAX_INSTANCES="${AGENT_MAX_INSTANCES:-6}"
          AGENT_CONTAINER_CONCURRENCY="${AGENT_CONTAINER_CONCURRENCY:-18}"

          MEMORY_BANK_ARGS=()
          if [ "${MEMORY_BANK_ENABLED}" = "true" ]; then
            MEMORY_BANK_ARGS+=(
              --memory-bank-enabled
              --memory-bank-max-facts 5
              --memory-bank-fetch-limit 20
              --memory-bank-generate-on-correction-only
            )

            if [ -n "${MEMORY_BANK_AGENT_ENGINE_NAME}" ]; then
              MEMORY_BANK_ARGS+=(
                --memory-bank-agent-engine-name "${MEMORY_BANK_AGENT_ENGINE_NAME}"
              )
            fi
          fi

          CODE_EXECUTION_ARGS=()
          if [ "${CODE_EXECUTION_ENABLED}" = "true" ]; then
            CODE_EXECUTION_ARGS+=(
              --code-execution-enabled
              --code-execution-location "us-central1"
              --code-execution-sandbox-ttl-seconds 3600
              --code-execution-max-rows 500
            )

            if [ -n "${CODE_EXECUTION_AGENT_ENGINE_NAME}" ]; then
              CODE_EXECUTION_ARGS+=(
                --code-execution-agent-engine-name "${CODE_EXECUTION_AGENT_ENGINE_NAME}"
              )
            fi
          fi

          PREFLIGHT_ARGS=()
          if [ "${PREFLIGHT_TOKEN_CHECK_ENABLED}" = "true" ]; then
            PREFLIGHT_ARGS+=(--preflight-token-check-enabled)

            if [ -n "${PREFLIGHT_TOKEN_THRESHOLD}" ]; then
              PREFLIGHT_ARGS+=(--preflight-token-threshold "${PREFLIGHT_TOKEN_THRESHOLD}")
            fi

            if [ -n "${PREFLIGHT_TOKEN_HARD_LIMIT}" ]; then
              PREFLIGHT_ARGS+=(--preflight-token-hard-limit "${PREFLIGHT_TOKEN_HARD_LIMIT}")
            fi
          fi

          uv run python deployment/deploy.py \
            --project-id "$PROJECT_ID" \
            --location "$REGION" \
            --staging-bucket "$STAGING_BUCKET" \
            --display-name "f1-agent" \
            --service-account "$SA_EMAIL" \
            --min-instances "$AGENT_MIN_INSTANCES" \
            --max-instances "$AGENT_MAX_INSTANCES" \
            --container-concurrency "$AGENT_CONTAINER_CONCURRENCY" \
            --rag-backend "auto" \
            --rag-corpus "$RAG_CORPUS" \
            --rag-location "${RAG_REGION:-$REGION}" \
            "${MEMORY_BANK_ARGS[@]}" \
            "${CODE_EXECUTION_ARGS[@]}" \
            "${PREFLIGHT_ARGS[@]}"
          # Optional A5 flags (manual rollout):
          #   --example-store-enabled \
          #   --example-store-name "projects/<PROJECT_NUMBER>/locations/us-central1/exampleStores/<EXAMPLE_STORE_ID>" \
          #   --example-store-top-k 3 \
          #   --example-store-min-score 0.65
          # Optional A6 flags (manual rollout):
          #   --code-execution-enabled \
          #   --code-execution-location "us-central1" \
          #   --code-execution-agent-engine-name "projects/<PROJECT_NUMBER>/locations/us-central1/reasoningEngines/<AGENT_ENGINE_ID>" \
          #   --code-execution-sandbox-ttl-seconds 3600 \
          #   --code-execution-max-rows 500
          # Optional A3 flags (manual rollout):
          #   --memory-bank-enabled \
          #   --memory-bank-agent-engine-name "projects/<PROJECT_NUMBER>/locations/us-central1/reasoningEngines/<AGENT_ENGINE_ID>" \
          #   --memory-bank-max-facts 5 \
          #   --memory-bank-fetch-limit 20 \
          #   --memory-bank-generate-on-correction-only

      - name: Smoke test deployed agent (read-only)
        run: |
          RESOURCE_NAME=$(uv run python -c 'import json; print(json.load(open("deployment_metadata.json"))["resource_name"])')
          uv run python deployment/smoke_agent_engine.py \
            --project-id "$PROJECT_ID" \
            --location "$REGION" \
            --resource-name "$RESOURCE_NAME" \
            --display-name "f1-agent"

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v7
        with:
          name: deployment-metadata
          path: deployment_metadata.json
